<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classora</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            background: white;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        p {
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎓 Welcome to Classora</h1>

        <p>
            Premium Hindi Medium Humanities Learning Platform
        </p>

        <p>
            Class 11th और Class 12th के विद्यार्थियों के लिए नोट्स,
            प्रश्नोत्तर और अध्ययन सामग्री।
        </p>

        <a href="#" class="btn">शुरू करें</a>
    </div>

</body>
</html>
